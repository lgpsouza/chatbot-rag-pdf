<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[TITULO_DA_PAGINA]</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background: #222222;
            min-height: 100vh;
            color: white;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(255, 162, 3, 0.2);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(255, 162, 3, 0.3);
        }

        .primary-color {
            color: #FFA203;
        }

        .primary-bg {
            background: #FFA203;
        }

        .icon-container {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 162, 3, 0.2);
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes scroll-bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(10px);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -200% center;
            }

            100% {
                background-position: 200% center;
            }
        }

        /* === BARRA DE PROGRESSO DE LEITURA === */
        #reading-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #FFA203, #FF6B00, #FFA203);
            background-size: 200% 100%;
            animation: shimmer 2s linear infinite;
            z-index: 9999;
            transition: width 0.1s linear;
            box-shadow: 0 0 10px rgba(255, 162, 3, 0.5);
        }

        /* === BOTÃO PRÓXIMO CARD === */
        #next-card {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 162, 3, 0.9);
            color: #222222;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            z-index: 9998;
            box-shadow: 0 4px 20px rgba(255, 162, 3, 0.4);
            border: none;
        }

        #next-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        #next-card:hover {
            transform: translateY(-3px) scale(1.1);
            box-shadow: 0 8px 30px rgba(255, 162, 3, 0.6);
        }
    </style>
</head>

<body class="font-sans">

    <!-- Barra de Progresso de Leitura -->
    <div id="reading-progress" style="width: 0%;"></div>

    <!-- Botão Próximo Card (flutuante) -->
    <button id="next-card" aria-label="Próximo card">
        <i data-lucide="chevron-down" class="w-6 h-6" id="next-card-icon"></i>
    </button>

    <script>
        AOS.init({ duration: 800, once: true, offset: 100 });
        lucide.createIcons();

        // === Navegação Card-a-Card ===
        const cardSections = [];

        function buildCardSections() {
            cardSections.length = 0;
            // Busca wrappers gerados via JS (fallback para cards se script falhar)
            const wrappers = document.querySelectorAll('.fullscreen-wrapper');
            if (wrappers.length > 0) {
                wrappers.forEach(el => cardSections.push(el));
            } else {
                document.querySelectorAll('main > .glass-card, main > div:not(.glass-card)').forEach(el => cardSections.push(el));
            }
        }

        function getCurrentSectionIndex() {
            const scrollTop = window.scrollY + window.innerHeight * 0.3;
            let idx = -1;
            for (let i = 0; i < cardSections.length; i++) {
                if (cardSections[i].offsetTop <= scrollTop) {
                    idx = i;
                }
            }
            return idx;
        }

        // === Scroll: Progresso + Visibilidade do Botão ===
        window.addEventListener('scroll', () => {
            const scrollTop = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const progress = (scrollTop / docHeight) * 100;
            document.getElementById('reading-progress').style.width = progress + '%';

            const btn = document.getElementById('next-card');
            if (scrollTop > 300) {
                btn.classList.add('visible');
            } else {
                btn.classList.remove('visible');
            }

            const icon = document.getElementById('next-card-icon');
            const atBottom = (scrollTop + window.innerHeight) >= (document.documentElement.scrollHeight - 100);
            if (atBottom) {
                icon.setAttribute('data-lucide', 'chevron-up');
            } else {
                icon.setAttribute('data-lucide', 'chevron-down');
            }
            lucide.createIcons();
        });

        // === Clique: Próximo Card ===
        document.getElementById('next-card').addEventListener('click', () => {
            const atBottom = (window.scrollY + window.innerHeight) >= (document.documentElement.scrollHeight - 100);
            if (atBottom) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
                return;
            }

            const idx = getCurrentSectionIndex();
            const nextIdx = idx + 1;
            if (nextIdx < cardSections.length) {
                // Sempre alinha ao TOPO do wrapper (que é 100vh e centralizado)
                cardSections[nextIdx].scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        });

        // === Animações: Contadores e Barras de Progresso ===
        function animateCounters() {
            const counters = document.querySelectorAll('.counter');
            counters.forEach(counter => {
                const target = parseInt(counter.getAttribute('data-target'));
                const duration = 2000;
                const increment = target / (duration / 16);
                let current = 0;
                const updateCounter = () => {
                    current += increment;
                    if (current < target) {
                        counter.textContent = Math.ceil(current) + '%';
                        requestAnimationFrame(updateCounter);
                    } else { counter.textContent = target + '%'; }
                };
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => { if (entry.isIntersecting) { updateCounter(); observer.unobserve(entry.target); } });
                });
                observer.observe(counter);
            });
        }

        function animateProgressBars() {
            document.querySelectorAll('.progress-bar-fill').forEach(bar => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            setTimeout(() => { bar.style.width = bar.getAttribute('data-width') + '%'; }, 200);
                            observer.unobserve(entry.target);
                        }
                    });
                });
                observer.observe(bar);
            });
        }

        // === Configuração de Modo Tela Cheia (Wrappers) ===
        function setupFullScreenWrappers() {
            const main = document.querySelector('main');
            if (!main) return;

            // Remove espaçamentos antigos
            main.classList.remove('gap-[60vh]', 'py-20');
            main.style.paddingTop = '';

            const children = Array.from(main.children);
            children.forEach(child => {
                if (child.tagName === 'DIV' && !child.classList.contains('fullscreen-wrapper')) {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'min-h-screen w-full flex items-center justify-center fullscreen-wrapper snap-start p-4';
                    child.parentNode.insertBefore(wrapper, child);
                    wrapper.appendChild(child);
                }
            });

            buildCardSections();
        }

        // === Inicia ===
        document.addEventListener('DOMContentLoaded', () => {
            setupFullScreenWrappers();
            setTimeout(animateCounters, 500);
            setTimeout(animateProgressBars, 600);

            const headerBtn = document.getElementById('header-next-btn');
            if (headerBtn) {
                headerBtn.addEventListener('click', () => {
                    if (cardSections.length > 0) {
                        cardSections[0].scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                });
            }

            // === Navegação por Teclado ===
            document.addEventListener('keydown', (e) => {
                const idx = getCurrentSectionIndex();

                if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === 'PageDown') {
                    e.preventDefault();
                    const nextIdx = idx + 1;
                    if (nextIdx < cardSections.length) {
                        cardSections[nextIdx].scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'PageUp') {
                    e.preventDefault();
                    const prevIdx = idx - 1;
                    if (prevIdx >= 0) {
                        cardSections[prevIdx].scrollIntoView({ behavior: 'smooth', block: 'start' });
                    } else if (idx === 0 || idx === -1) {
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                }
            });

            window.addEventListener('resize', setupFullScreenWrappers);
        });
    </script>
</body>

</html>
