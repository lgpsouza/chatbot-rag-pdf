<!-- CARD CTA: [TITULO] -->
<div class="glass-card rounded-2xl p-12 w-full max-w-3xl text-center bg-gradient-to-br from-[#FFA203]/10 to-transparent border border-[#FFA203]/30"
    data-aos="fade-up" data-aos-delay="[DELAY]">

    <div class="flex flex-col md:flex-row items-center gap-12">
        <!-- Imagem -->
        <div class="w-full md:w-1/2" data-aos="fade-right" data-aos-delay="[DELAY+200]">
            <img src="[IMAGEM_URL]" alt="[IMAGEM_ALT]"
                class="w-full h-auto drop-shadow-[0_0_25px_rgba(255,162,3,0.3)] hover:scale-105 transition-transform duration-500">
        </div>

        <!-- Conteúdo -->
        <div class="w-full md:w-1/2 text-left">
            <div class="mb-6">
                <span
                    class="inline-block bg-[#FFA203] text-black text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider mb-3">[TAG_SUPERIOR]</span>
                <h3 class="text-3xl md:text-4xl font-black text-white mb-4 leading-tight">[TITULO_PRINCIPAL] <span
                        class="text-[#FFA203]">[TITULO_DESTAQUE]</span>
                </h3>
                <p class="text-white/80 mb-6 text-lg">[SUBTITULO]</p>

                <ul class="space-y-4 mb-8">
                    <li class="flex items-start">
                        <i data-lucide="check-circle-2" class="w-5 h-5 text-[#FFA203] mr-3 mt-1 flex-shrink-0"></i>
                        <span class="text-white/90"><strong>[BENEFICIO_1_TITULO]:</strong> [BENEFICIO_1_DESC]</span>
                    </li>
                    <li class="flex items-start">
                        <i data-lucide="video" class="w-5 h-5 text-[#FFA203] mr-3 mt-1 flex-shrink-0"></i>
                        <span class="text-white/90"><strong>[BENEFICIO_2_TITULO]:</strong> [BENEFICIO_2_DESC]</span>
                    </li>
                    <li class="flex items-start">
                        <i data-lucide="users" class="w-5 h-5 text-[#FFA203] mr-3 mt-1 flex-shrink-0"></i>
                        <span class="text-white/90"><strong>[BENEFICIO_3_TITULO]:</strong> [BENEFICIO_3_DESC]</span>
                    </li>
                </ul>
            </div>

            <div class="flex flex-col gap-4">
                <a href="[LINK_CTA]" target="_blank"
                    class="w-full px-8 py-4 bg-[#FFA203] text-black font-bold rounded-lg hover:bg-[#ffb340] transition-colors flex items-center justify-center gap-2 transform hover:scale-105 shadow-[0_0_20px_rgba(255,162,3,0.4)]">
                    <i data-lucide="book-open-check"></i>
                    [TEXTO_BOTAO]
                </a>
                <p class="text-center text-xs text-white/40">[TEXTO_GARANTIA]</p>
            </div>
        </div>
    </div>
</div>
