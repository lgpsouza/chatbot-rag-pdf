<div class="glass-card rounded-xl overflow-hidden w-full max-w-4xl" data-aos="fade-up" data-aos-delay="[DELAY]">
    <div class="bg-white/10 px-4 py-2 flex items-center justify-between border-b border-white/10">
        <div class="flex gap-1.5">
            <div class="w-3 h-3 rounded-full bg-red-500/50"></div>
            <div class="w-3 h-3 rounded-full bg-yellow-500/50"></div>
            <div class="w-3 h-3 rounded-full bg-green-500/50"></div>
        </div>
        <div class="flex items-center gap-2">
            <i data-lucide="code-2" class="w-4 h-4 text-white/40"></i>
            <span class="text-xs font-mono text-white/40 uppercase tracking-widest">[LINGUAGEM]</span>
        </div>
        <button class="text-white/40 hover:text-[#FFA203] transition-colors"
            onclick="navigator.clipboard.writeText(`[CODIGO_RAW]`)">
            <i data-lucide="copy" class="w-4 h-4"></i>
        </button>
    </div>

    <div class="p-8 overflow-x-auto bg-[#1a1a1a]/50">
        <pre class="font-mono text-3xl md:text-4xl font-bold leading-relaxed text-white/90"><code>[CONTEUDO_CODIGO]</code></pre>
    </div>

    <div class="px-8 py-4 bg-white/5 border-t border-white/5 flex items-center justify-between">
        <span class="text-lg text-white/40 font-mono italic">// [DESCRICAO_DO_ARQUIVO]</span>
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full primary-bg animate-pulse"></div>
            <span class="text-lg text-white/60 font-medium">Ready</span>
        </div>
    </div>
</div>
