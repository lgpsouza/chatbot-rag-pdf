<header class="min-h-screen flex items-center justify-center relative overflow-hidden"
    style="background: linear-gradient(-45deg, #1a1a1a, #2d2d2d, #1a1a2e, #16213e); background-size: 400% 400%; animation: gradientShift 15s ease infinite;">
    <div class="absolute inset-0 pointer-events-none"
        style="background-image: radial-gradient(circle at 20% 80%, rgba(255, 162, 3, 0.15) 0%, transparent 50%), radial-gradient(circle at 80% 20%, rgba(255, 162, 3, 0.1) 0%, transparent 50%);">
    </div>
    <div class="text-center relative z-10" data-aos="fade-down">
        <span
            class="inline-block bg-[#FFA203] text-white text-sm font-bold px-4 py-2 rounded-full mb-6">[TIPO_CONTEUDO]</span>
        <h1 class="text-5xl md:text-6xl font-bold mb-4">[TITULO_PRINCIPAL]</h1>
        <p class="text-xl text-white/90 max-w-3xl mx-auto mb-8">[SUBTITULO]</p>

        <!-- Opcional-->
        <div class="text-7xl md:text-8xl font-black primary-color" data-aos="zoom-in" data-aos-delay="200">
            [DESTAQUE_NUMERICO]%</div>
    </div>

    <!-- Botão "Começar" — navega ao primeiro card -->
    <button
        class="absolute bottom-8 right-8 flex flex-col items-center gap-2 cursor-pointer bg-transparent border-none group"
        id="header-next-btn" aria-label="Ir para o primeiro card"
        style="animation: scroll-bounce 2s ease-in-out infinite;">
        <span
            class="text-[10px] uppercase tracking-[4px] text-white/30 font-medium group-hover:text-[#FFA203] transition-colors">Iniciar</span>
        <div
            class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center group-hover:bg-[#FFA203]/20 transition-all">
            <i data-lucide="chevron-down"
                class="w-5 h-5 text-white/40 group-hover:text-[#FFA203] transition-colors"></i>
        </div>
    </button>
</header>
<main class="container mx-auto px-4 py-20 flex flex-col items-center gap-[60vh]">
